name: Docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run build
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: |
          if [ -f ./scripts/check-changeset-status.sh ]; then
            bash ./scripts/check-changeset-status.sh
          else
            bun run changeset:status
          fi

      - name: Generate docs
        run: bun run docs

      - name: Format generated docs
        run: bun run format

      - name: Check generated docs and formatting
        run: git diff --exit-code
