name: Apply source-backed config README implementation

on:
  push:
    branches:
      - agent/source-backed-config-readme

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/source-backed-config-readme
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply implementation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}:\n{old}')
              file.write_text(text.replace(old, new, 1))

          Path('src/analyze/readmeConfig.ts').write_text("""import { readFile } from 'node:fs/promises';
          import { extname, relative } from 'node:path';

          import { parseParadoxComment } from './utils/parseParadoxComment.js';

          export interface AnalysisReadmeConfig {
            description: string | null;
            language: string;
            code: string;
            sourcePath: string;
          }

          interface ConfigCommentMatch {
            comment: string;
            start: number;
            end: number;
          }

          /***
           * Collects a README configuration example from the actual Paradox config file when its
           * leading Paradox comment is marked with both @config and @readme.
           */
          export async function analyzeReadmeConfig(options: {
            root: string;
            configFilePath: string | null;
          }): Promise<AnalysisReadmeConfig | null> {
            if (options.configFilePath === null) return null;

            const source = await readFile(options.configFilePath, 'utf-8');
            const match = findLeadingParadoxComment(source);
            if (match === null) return null;

            const parsed = parseParadoxComment(match.comment);
            if (!parsed.isConfig || !parsed.isReadme) return null;

            const sourcePath = toPosixPath(relative(options.root, options.configFilePath));

            return {
              description: parsed.description,
              language: getLanguage(sourcePath),
              code: removeRange(source, match.start, match.end).trim(),
              sourcePath,
            };
          }

          function findLeadingParadoxComment(source: string): ConfigCommentMatch | null {
            const match = /^\\s*(\\/\\*\\*\\*[\\s\\S]*?\\*\\/)/.exec(source);
            const comment = match?.[1];
            if (match === null || comment === undefined) return null;

            const start = match[0].indexOf(comment);

            return {
              comment,
              start,
              end: start + comment.length,
            };
          }

          function removeRange(source: string, start: number, end: number): string {
            const before = source.slice(0, start).trimEnd();
            const after = source.slice(end).trimStart();

            if (before.length === 0) return after;
            if (after.length === 0) return before;

            return `${before}\\n\\n${after}`;
          }

          function getLanguage(sourcePath: string): string {
            const extension = extname(sourcePath).toLowerCase();

            if (extension === '.ts') return 'ts';
            if (extension === '.js' || extension === '.mjs' || extension === '.cjs') return 'js';

            return '';
          }

          function toPosixPath(path: string): string {
            return path.replaceAll('\\\\', '/');
          }
          """.replace('          ', ''))

          replace(
              'src/analyze/analyze.ts',
              "import { createProject } from './project.js';\nimport { analyzeReadmeUsage } from './readmeUsage.js';",
              "import { createProject } from './project.js';\nimport { analyzeReadmeConfig } from './readmeConfig.js';\nimport { analyzeReadmeUsage } from './readmeUsage.js';",
          )
          replace(
              'src/analyze/analyze.ts',
              "  runtime: { packageRoot: string },",
              "  runtime: { packageRoot: string; configFilePath?: string },",
          )
          replace(
              'src/analyze/analyze.ts',
              "  const readmeUsageDescription = config.docs?.usage?.description ?? null;\n  const usageEntryPoints = config.docs?.usage?.entrypoints ?? [];\n  const readmeUsage = await analyzeReadmeUsage({ root, entrypoints: usageEntryPoints });",
              "  const readmeUsageDescription = config.docs?.usage?.description ?? null;\n  const usageEntryPoints = config.docs?.usage?.entrypoints ?? [];\n  const readmeUsage = await analyzeReadmeUsage({ root, entrypoints: usageEntryPoints });\n  const readmeConfig = await analyzeReadmeConfig({\n    root,\n    configFilePath: runtime.configFilePath ?? null,\n  });",
          )
          replace(
              'src/analyze/analyze.ts',
              "    readmeUsageDescription,\n    readmeUsage,\n    config: configMetadata",
              "    readmeUsageDescription,\n    readmeUsage,\n    readmeConfig,\n    config: configMetadata",
          )

          replace(
              'src/analyze/types.ts',
              "interface AnalysisReadmeUsage {\n  title: string | null;\n  description: string | null;\n  language: string;\n  code: string;\n  sourcePath: string;\n}\n",
              "interface AnalysisReadmeUsage {\n  title: string | null;\n  description: string | null;\n  language: string;\n  code: string;\n  sourcePath: string;\n}\n\ninterface AnalysisReadmeConfig {\n  description: string | null;\n  language: string;\n  code: string;\n  sourcePath: string;\n}\n",
          )
          replace(
              'src/analyze/types.ts',
              "  readmeUsageDescription: string | null;\n  readmeUsage: AnalysisReadmeUsage[];\n\n  config:",
              "  readmeUsageDescription: string | null;\n  readmeUsage: AnalysisReadmeUsage[];\n  readmeConfig: AnalysisReadmeConfig | null;\n\n  config:",
          )

          replace(
              'src/model/types.ts',
              "  readmeUsageDescription: string | null;\n  readmeUsage: ReadmeUsageModel[];\n  config: ConfigModel | null;",
              "  readmeUsageDescription: string | null;\n  readmeUsage: ReadmeUsageModel[];\n  readmeConfig: ReadmeConfigModel | null;\n  config: ConfigModel | null;",
          )
          replace(
              'src/model/types.ts',
              "interface ConfigModel {\n  exportName: string;\n  isReadme: boolean;\n  configFile: string;\n  factoryName: string | null;\n  members: ConfigMemberModel[];\n}",
              "interface ReadmeConfigModel {\n  description: string | null;\n  language: string;\n  code: string;\n  sourcePath: string;\n}\n\ninterface ConfigModel {\n  exportName: string;\n  isReadme: boolean;\n  members: ConfigMemberModel[];\n}",
          )

          replace(
              'src/model/buildModel.ts',
              "  readmeUsage: {\n    title: string | null;\n    description: string | null;\n    language: string;\n    code: string;\n    sourcePath: string;\n  }[];\n  config:",
              "  readmeUsage: {\n    title: string | null;\n    description: string | null;\n    language: string;\n    code: string;\n    sourcePath: string;\n  }[];\n  readmeConfig: {\n    description: string | null;\n    language: string;\n    code: string;\n    sourcePath: string;\n  } | null;\n  config:",
          )
          replace(
              'src/model/buildModel.ts',
              "      }))\n      .sort((left, right) => left.sourcePath.localeCompare(right.sourcePath)),\n    config:\n      analysis.config !== null\n        ? {\n            exportName: analysis.config.exportName,\n            isReadme: analysis.config.isReadme,\n            configFile: getDefaultConfigFileName(analysis.packageId),\n            factoryName: findConfigFactoryName(analysis.config.exportName, [\n              ...exportsByName.keys(),\n            ]),\n            members: analysis.config.members,\n          }\n        : null,",
              "      }))\n      .sort((left, right) => left.sourcePath.localeCompare(right.sourcePath)),\n    readmeConfig:\n      analysis.readmeConfig !== null\n        ? {\n            description: analysis.readmeConfig.description,\n            language: analysis.readmeConfig.language,\n            code: analysis.readmeConfig.code,\n            sourcePath: analysis.readmeConfig.sourcePath,\n          }\n        : null,\n    config:\n      analysis.config !== null\n        ? {\n            exportName: analysis.config.exportName,\n            isReadme: analysis.config.isReadme,\n            members: analysis.config.members,\n          }\n        : null,",
          )
          replace(
              'src/model/buildModel.ts',
              "\n/***\n * Finds the conventional config factory export for a config type when present.\n */\nfunction findConfigFactoryName(configExportName: string, exportNames: string[]): string | null {\n  const prefix = configExportName.endsWith('Config')\n    ? configExportName.slice(0, -'Config'.length)\n    : configExportName;\n  const expectedFactoryName = `define${prefix}Config`;\n\n  return exportNames.includes(expectedFactoryName) ? expectedFactoryName : null;\n}\n\n/***\n * Derives the default config file name from a package id.\n */\nfunction getDefaultConfigFileName(packageId: string): string {\n  const packageBaseName = packageId.split('/').pop() ?? packageId;\n\n  return `${packageBaseName}.config.ts`;\n}\n",
              "",
          )

          replace(
              'src/render/renderers/markdown.ts',
              "  if (model.config?.isReadme) renderConfiguration(lines, model);",
              "  renderConfiguration(lines, model);",
          )
          replace(
              'src/render/renderers/markdown.ts',
              "function renderConfiguration(lines: string[], model: DocumentationModel): void {\n  const { config } = model;\n  if (config === null) return;\n\n  lines.push('## Configuration', '');\n  lines.push(`Create a \\`${config.configFile}\\` file:`, '');\n  lines.push('```ts');\n\n  if (config.factoryName !== null) {\n    lines.push(`import { ${config.factoryName} } from '${model.packageId}';`);\n    lines.push('');\n    lines.push(`export default ${config.factoryName}({`);\n    lines.push('  // ...');\n    lines.push('});');\n  } else {\n    lines.push(`import type { ${config.exportName} } from '${model.packageId}';`);\n    lines.push('');\n    lines.push('const config = {');\n    lines.push('  // ...');\n    lines.push(`} satisfies ${config.exportName};`);\n    lines.push('');\n    lines.push('export default config;');\n  }\n\n  lines.push('```', '');\n\n  if (config.members.length === 0) return;",
              "function renderConfiguration(lines: string[], model: DocumentationModel): void {\n  const config = model.config?.isReadme ? model.config : null;\n  const example = model.readmeConfig;\n  if (config === null && example === null) return;\n\n  lines.push('## Configuration', '');\n\n  if (example !== null) {\n    if (example.description !== null) lines.push(example.description, '');\n    lines.push(`\\`\\`\\`${example.language}`);\n    lines.push(example.code);\n    lines.push('```', '');\n  }\n\n  if (config === null || config.members.length === 0) return;",
          )

          replace(
              'src/cli/standalone.ts',
              "  const analysis = await analyze(config, { packageRoot });",
              "  const analysis = await analyze(config, { packageRoot, configFilePath });",
          )

          replace(
              'src/doc-tags/registry.ts',
              "    description:\n      'Marks a type or interface as part of the Paradox configuration model. @config alone does not imply README inclusion; use @config plus @readme for README output.',\n    appliesTo: ['interface', 'type'],",
              "    description:\n      'Marks a configuration type, interface, or source block. Pair with @readme to include the schema or actual config source in README Configuration output.',\n    appliesTo: ['block', 'interface', 'type'],",
          )

          config_path = Path('paradox.config.ts')
          config_text = config_path.read_text()
          config_path.write_text("""/***
           * Canonical Paradox configuration for this package.
           *
           * @config
           * @readme
           */
          """.replace('          ', '') + config_text)

          Path('tests/readmeConfig.test.ts').write_text("""import { mkdir, rm, writeFile } from 'node:fs/promises';
          import { join } from 'node:path';

          import { describe, expect, test } from 'bun:test';

          import { analyze } from '../src/analyze/analyze.js';
          import { buildModel } from '../src/model/buildModel.js';
          import { render } from '../src/render/render.js';

          const configTag = `${String.fromCharCode(64)}config`;
          const readmeTag = `${String.fromCharCode(64)}readme`;

          describe('readme configuration source', () => {
            test('renders the actual tagged config file instead of synthesized boilerplate', async () => {
              const fixture = await createConfigFixture(true);

              try {
                const analysis = await analyze(
                  {
                    docs: {
                      title: 'Config Fixture',
                      description: 'Fixture docs for source-backed configuration.',
                    },
                    package: {
                      root: fixture.root,
                      entrypoints: ['src/index.ts'],
                    },
                  },
                  {
                    packageRoot: fixture.root,
                    configFilePath: fixture.configFilePath,
                  },
                );

                expect(analysis.readmeConfig).toEqual({
                  description: 'Canonical fixture configuration.',
                  language: 'ts',
                  code: [
                    "import { defineFixtureConfig } from './src/index.js';",
                    '',
                    'export default defineFixtureConfig({',
                    "  mode: 'write',",
                    '});',
                  ].join('\\n'),
                  sourcePath: 'paradox.config.ts',
                });

                const output = render(buildModel(analysis), { outputDir: 'paradox' });
                const configurationStart = output.readme.indexOf('## Configuration');
                const generatedDocsStart = output.readme.indexOf('## Generated documentation');
                const configurationSection = output.readme.slice(
                  configurationStart,
                  generatedDocsStart,
                );

                expect(configurationSection).toContain('Canonical fixture configuration.');
                expect(configurationSection).toContain(
                  "import { defineFixtureConfig } from './src/index.js';",
                );
                expect(configurationSection).toContain("mode: 'write'");
                expect(configurationSection).toContain('<summary>Configuration options</summary>');
                expect(configurationSection).not.toContain('Create a `fixture.config.ts` file:');
                expect(configurationSection).not.toContain('// ...');
                expect(configurationSection).not.toContain(configTag);
                expect(configurationSection).not.toContain(readmeTag);
                expect(configurationSection).not.toContain('/***');
              } finally {
                await rm(fixture.root, { force: true, recursive: true });
              }
            });

            test('requires readme opt-in on the leading config comment', async () => {
              const fixture = await createConfigFixture(false);

              try {
                const analysis = await analyze(
                  {
                    docs: {
                      title: 'Config Fixture',
                    },
                    package: {
                      root: fixture.root,
                      entrypoints: ['src/index.ts'],
                    },
                  },
                  {
                    packageRoot: fixture.root,
                    configFilePath: fixture.configFilePath,
                  },
                );

                expect(analysis.readmeConfig).toBeNull();

                const output = render(buildModel(analysis), { outputDir: 'paradox' });
                const configurationStart = output.readme.indexOf('## Configuration');
                const generatedDocsStart = output.readme.indexOf('## Generated documentation');
                const configurationSection = output.readme.slice(
                  configurationStart,
                  generatedDocsStart,
                );

                expect(configurationSection).toContain('<summary>Configuration options</summary>');
                expect(configurationSection).not.toContain('defineFixtureConfig({');
              } finally {
                await rm(fixture.root, { force: true, recursive: true });
              }
            });
          });

          async function createConfigFixture(includeReadmeTag: boolean): Promise<{
            root: string;
            configFilePath: string;
          }> {
            const root = join(import.meta.dir, '.tmp', `config-${Date.now()}-${Math.random()}`);
            const configFilePath = join(root, 'paradox.config.ts');
            await mkdir(join(root, 'src'), { recursive: true });

            await writeFile(
              join(root, 'package.json'),
              JSON.stringify(
                {
                  name: '@fixture/config',
                  version: '1.0.0',
                  description: 'Fixture package for source-backed configuration.',
                  license: 'MIT',
                  scripts: {
                    build: 'tsc --noEmit',
                    lint: 'eslint .',
                    test: 'bun test',
                  },
                  devDependencies: {
                    typescript: '^5.9.3',
                  },
                },
                null,
                2,
              ),
            );

            await writeFile(
              join(root, 'tsconfig.json'),
              JSON.stringify(
                {
                  compilerOptions: {
                    target: 'ES2022',
                    module: 'ESNext',
                    moduleResolution: 'Bundler',
                    strict: true,
                    skipLibCheck: true,
                  },
                  include: ['src'],
                },
                null,
                2,
              ),
            );

            await writeFile(
              join(root, 'src/index.ts'),
              [
                '/***',
                ' * Fixture configuration schema.',
                ' *',
                ` * ${configTag}`,
                ` * ${readmeTag}`,
                ' */',
                'export interface FixtureConfig {',
                "  mode?: 'safe' | 'write';",
                '}',
                '',
                'export function defineFixtureConfig(config: FixtureConfig): FixtureConfig {',
                '  return config;',
                '}',
              ].join('\\n'),
            );

            await writeFile(
              configFilePath,
              [
                '/***',
                ' * Canonical fixture configuration.',
                ' *',
                ` * ${configTag}`,
                ...(includeReadmeTag ? [` * ${readmeTag}`] : []),
                ' */',
                "import { defineFixtureConfig } from './src/index.js';",
                '',
                'export default defineFixtureConfig({',
                "  mode: 'write',",
                '});',
              ].join('\\n'),
            );

            return { root, configFilePath };
          }
          """.replace('          ', ''))

          Path('.changeset/source-backed-config-readme.md').write_text("""---
          '@ankhorage/paradox': patch
          ---

          Render README Configuration examples from the actual tagged Paradox config file instead of synthesized boilerplate.
          """.replace('          ', ''))
          PY

      - name: Format implementation
        run: bun run format

      - name: Validate implementation
        run: |
          bun run build
          bun run lint
          bun run format:check
          bun run knip
          bun run test
          bun run typecheck

      - name: Regenerate docs
        run: |
          bun run docs
          bun run format

      - name: Commit implementation and generated docs
        run: |
          git add . ':!.github/workflows/agent-source-backed-config.yml'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Render README config from tagged source"
          git push origin HEAD:agent/source-backed-config-readme
