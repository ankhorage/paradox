name: Finalize CLI docs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/standardize-cli-layout
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and format docs
        run: |
          bun run docs
          bun run format

      - name: Validate
        run: |
          bun run lint
          bun run typecheck
          bun run build
          bun run test
          bun run knip

      - name: Remove one-time workflow
        run: rm .github/workflows/finalize-cli-docs.yml

      - name: Commit generated docs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Regenerate docs for canonical CLI path"
          git push origin HEAD:agent/standardize-cli-layout
