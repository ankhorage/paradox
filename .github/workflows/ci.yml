name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply source-driven CLI README implementation
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: |
          node .github/scripts/apply-source-driven-cli.mjs
          node .github/scripts/apply-readme-usage-test-fix.mjs
          rm -f .github/scripts/apply-source-driven-cli.mjs
          rm -f .github/scripts/apply-readme-usage-test-fix.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Format implementation
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: bun run format

      - name: Run build
        run: bun run build

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Regenerate docs
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: |
          bun run docs
          bun run format
          bun run format:check

      - name: Commit implementation
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "render CLI docs from canonical CLI entrypoint"
          git push origin HEAD:agent/source-driven-cli-readme
