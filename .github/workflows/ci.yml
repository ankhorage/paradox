name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply source-driven CLI README implementation
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: |
          node .github/scripts/apply-source-driven-cli.mjs
          rm -f .github/scripts/apply-source-driven-cli.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Format implementation
        if: github.head_ref == 'agent/source-driven-cli-readme'
        run: bun run format

      - name: Run build
        run: bun run build

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Capture test output
        run: |
          set +e
          bun run test > test-output.txt 2>&1
          echo $? > test-exit-code.txt
          cat test-output.txt
          exit 0

      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt

      - name: Fail on test errors
        run: test "$(cat test-exit-code.txt)" = "0"
