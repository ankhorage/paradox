name: Apply source-driven CLI README implementation

on:
  push:
    branches:
      - agent/source-driven-cli-readme

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/source-driven-cli-readme
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Apply CLI README changes
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              if old not in source:
                  raise SystemExit(f'Expected snippet not found in {path}: {old[:80]!r}')
              file.write_text(source.replace(old, new, 1))

          def replace_region(path: str, start: str, end: str, replacement: str) -> None:
              file = Path(path)
              source = file.read_text()
              start_index = source.find(start)
              if start_index < 0:
                  raise SystemExit(f'Start marker not found in {path}: {start!r}')
              end_index = source.find(end, start_index)
              if end_index < 0:
                  raise SystemExit(f'End marker not found in {path}: {end!r}')
              file.write_text(source[:start_index] + replacement + source[end_index:])

          replace_once(
              'src/render/renderers/markdown.ts',
              """  if (model.usage !== null) {
    lines.push('## Installation', '', '```bash');
    for (const command of model.usage.commands) lines.push(command.command);
    lines.push('```', '');
  }

  renderCliScenarios(lines, model, outputDir, diagrams);
""",
              """  renderReadmeCli(lines, model, outputDir, diagrams);
""",
          )

          replace_region(
              'src/render/renderers/markdown.ts',
              'function renderCliScenarios(',
              'function findScenarioDiagram(',
              """function renderReadmeCli(
  lines: string[],
  model: DocumentationModel,
  outputDir: string,
  diagrams: RenderContext['diagrams'],
): void {
  if (model.readmeCli === null) return;

  lines.push('## CLI', '');

  if (model.readmeCli.description !== null) lines.push(model.readmeCli.description, '');

  if (model.usage !== null && model.usage.commands.length > 0) {
    lines.push('```bash');
    for (const command of model.usage.commands) lines.push(command.command);
    lines.push('```', '');
  }

  const scenarios = model.sequenceScenarios.filter((scenario) => scenario.kind === 'bin');
  for (const scenario of scenarios) {
    const diagram = findScenarioDiagram(diagrams, scenario);
    if (scenario.description === null && diagram === undefined) continue;

    lines.push('<details>');
    lines.push(`<summary>${scenario.name}</summary>`, '');
    if (scenario.description !== null) lines.push(scenario.description, '');

    if (diagram !== undefined) {
      lines.push(`Diagram: [${diagram.title}](./${outputDir}/${diagram.path})`, '');
      lines.push('```mermaid');
      lines.push(diagram.content.trimEnd());
      lines.push('```', '');
    }

    lines.push('</details>', '');
  }
}

""",
          )

          replace_once(
              'src/render/renderers/html.ts',
              "${cliScenarios.length > 0 ? renderCliPanel(model, diagrams, cliScenarios) : ''}",
              "${model.readmeCli !== null ? renderCliPanel(model, diagrams, cliScenarios) : ''}",
          )

          replace_region(
              'src/render/renderers/html.ts',
              'function renderCliPanel(',
              '/***\n * Renders one source file entry in the left navigation.',
              """function renderCliPanel(
  model: DocumentationModel,
  diagrams: readonly DiagramArtifact[],
  scenarios: readonly SequenceScenarioEntry[],
): string {
  const commands = model.usage?.commands ?? [];
  const searchText = [
    'cli',
    model.readmeCli?.description ?? '',
    ...commands.map((command) => command.command),
    ...scenarios.map((scenario) => scenario.name),
  ].join(' ');

  return `<section class="panel" data-search="${escapeAttribute(searchText)}">
    <h2>CLI</h2>
    ${model.readmeCli?.description === null || model.readmeCli?.description === undefined ? '' : `<p>${escapeHtml(model.readmeCli.description)}</p>`}
    ${commands.length === 0 ? '' : `<pre>${escapeHtml(commands.map((command) => command.command).join('\\n'))}</pre>`}
    ${scenarios
      .map((scenario) => {
        const diagram = findScenarioDiagram(diagrams, scenario);
        if (scenario.description === null && diagram === undefined) return '';

        return `<article class="item" data-search="${escapeAttribute(
          [scenario.name, scenario.description ?? ''].join(' '),
        )}">
          <h3>${escapeHtml(scenario.name)}</h3>
          ${scenario.description === null ? '' : `<p>${escapeHtml(scenario.description)}</p>`}
          ${diagram === undefined ? '' : renderDiagramCard(diagram)}
        </article>`;
      })
      .join('')}
  </section>`;
}

/***
 * Renders one source file entry in the left navigation.
""",
          )

          replace_region(
              'src/render/renderers/html.ts',
              'function getReadmeCliScenarios(',
              '/***\n * Finds the generated Mermaid artifact for a sequence scenario.',
              """function getReadmeCliScenarios(model: DocumentationModel): SequenceScenarioEntry[] {
  if (model.readmeCli === null) return [];
  return model.sequenceScenarios.filter((scenario) => scenario.kind === 'bin');
}

/***
 * Finds the generated Mermaid artifact for a sequence scenario.
""",
          )

          Path('src/cli/index.ts').write_text("""/***
 * Generates deterministic documentation for a package through the Paradox CLI.
 *
 * @readme
 */
export { default } from '../docsSurface.js';
""")

          replace_once('src/cli/standalone.ts', ' *\n * @readme\n */', ' */')
          replace_once(
              'src/analyze/usage.ts',
              ' * Builds installation and executable usage commands from package metadata.',
              ' * Builds executable CLI commands from package metadata.',
          )

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package.setdefault('devDependencies', {})['@types/node'] = '^25.6.0'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          fixture_cli = Path('tests/fixtures/multi-bin/src/cli/index.ts')
          fixture_cli.parent.mkdir(parents=True, exist_ok=True)
          fixture_cli.write_text("""/***
 * Runs the fixture command-line interface.
 *
 * @readme
 */
export {};
""")

          tests = Path('tests/analyze.test.ts')
          source = tests.read_text()
          source = source.replace(
              "    expect(output.readme).toContain('## Configuration');\n",
              "    expect(output.readme).toContain('## Configuration');\n    expect(output.readme).not.toContain('## Installation');\n    expect(output.readme).not.toContain('## CLI');\n",
              1,
          )
          source = source.replace(
              "    expectGeneratedReadmeScaffold(output.readme, 'Multi Bin Fixture');\n    expect(output.readme).toContain('bunx fixture-multi-bin alpha');\n",
              "    expectGeneratedReadmeScaffold(output.readme, 'Multi Bin Fixture');\n    expect(output.readme).toContain('## CLI');\n    expect(output.readme).toContain('Runs the fixture command-line interface.');\n    expect(output.readme).not.toContain('## Installation');\n    expect(output.readme).toContain('bunx fixture-multi-bin alpha');\n",
              1,
          )
          tests.write_text(source)

          Path('tests/readmeCli.test.ts').write_text("""import { mkdir, mkdtemp, rm, writeFile } from 'node:fs/promises';
import { tmpdir } from 'node:os';
import { join } from 'node:path';

import { describe, expect, test } from 'bun:test';

import { analyzeReadmeCli } from '../src/analyze/readmeCli.js';

describe('README CLI analysis', () => {
  test('returns null when the canonical CLI entrypoint does not exist', async () => {
    const root = await mkdtemp(join(tmpdir(), 'paradox-readme-cli-'));
    try {
      expect(await analyzeReadmeCli(root)).toBeNull();
    } finally {
      await rm(root, { recursive: true, force: true });
    }
  });

  test('requires @readme in the leading comment of src/cli/index.ts', async () => {
    const root = await createCliFixture('/***\\n * CLI docs.\\n */\\nexport {};\\n');
    try {
      expect(await analyzeReadmeCli(root)).toBeNull();
    } finally {
      await rm(root, { recursive: true, force: true });
    }
  });

  test('uses the leading @readme comment as CLI chapter metadata', async () => {
    const root = await createCliFixture('/***\\n * CLI docs.\\n *\\n * @readme\\n */\\nexport {};\\n');
    try {
      expect(await analyzeReadmeCli(root)).toEqual({
        description: 'CLI docs.',
        sourcePath: 'src/cli/index.ts',
      });
    } finally {
      await rm(root, { recursive: true, force: true });
    }
  });
});

async function createCliFixture(source: string): Promise<string> {
  const root = await mkdtemp(join(tmpdir(), 'paradox-readme-cli-'));
  const cliRoot = join(root, 'src', 'cli');
  await mkdir(cliRoot, { recursive: true });
  await writeFile(join(cliRoot, 'index.ts'), source);
  return root;
}
""")

          Path('.changeset/source-driven-cli-readme.md').write_text("""---
'@ankhorage/paradox': patch
---

Generate the README CLI chapter from the canonical `src/cli/index.ts` `@readme` opt-in, keep executable commands under CLI instead of Installation, and declare the required Node.js types dependency.
""")
          PY

      - name: Install dependencies
        run: bun install

      - name: Format source
        run: bun run format

      - name: Validate implementation
        run: |
          bun run build
          bun run lint
          bun run format:check
          bun run knip
          bun run test
          bun run typecheck

      - name: Regenerate documentation
        run: |
          bun run docs
          bun run format
          bun run format:check

      - name: Commit implementation
        run: |
          rm -f .github/workflows/agent-source-driven-cli.yml .agent-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "render CLI docs from canonical CLI entrypoint"
          git push origin HEAD:agent/source-driven-cli-readme
