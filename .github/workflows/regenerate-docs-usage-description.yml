name: Regenerate docs for usage description

on:
  push:
    branches:
      - agent/usage-section-description

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/usage-section-description
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate docs
        run: bun run docs

      - name: Format generated docs
        run: bun run format

      - name: Commit generated docs
        run: |
          git add README.md paradox
          if git diff --cached --quiet; then
            echo "Generated docs are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Regenerate docs"
          git push origin HEAD:agent/usage-section-description
